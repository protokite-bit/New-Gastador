
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Gastador</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#cfefff" />
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" sizes="48x48" href="icons/icon-48.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    :root{ --bg:#cfefff; --card:#fff; --line:#b7c4cf; --sum:#fffb8f; --text: #0b0b0b; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    *{box-sizing:border-box}

    /* Base sizes tuned for mobile first */
    html{ font-size: 15px; }
    @media (max-width: 380px){ html{ font-size: 14px; } }
    @media (min-width: 768px){ html{ font-size: 16px; } }

    body{margin:0;background:var(--bg);color:var(--text);display:grid;place-items:start center;min-height:100dvh;padding:10px}
    .app{width:min(100%,900px)}
    header{text-align:center;margin-bottom:8px}
    header .wrap{display:flex;align-items:center;gap:10px;justify-content:center}
    h1{margin:0;font-size:1.1rem}

    .toolbar{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
    button{background:#fff;border:1.5px solid #000;border-radius:6px;padding:8px 10px;min-height:36px;min-width:36px;cursor:pointer;font-size:0.92rem}

    /* ==== TABLE LAYOUT (sticky header + responsive columns) ==== */
    :root{ --cols: 1.9fr 0.9fr 0.9fr 0.9fr; }

    .table-wrap{width:100%;background:var(--card);border:1.5px solid #000;border-radius:6px;overflow:auto;-webkit-overflow-scrolling:touch;max-height:min(65vh,520px)}
    .table{min-width:660px}

    .thead,.row{display:grid;grid-template-columns:var(--cols);align-items:stretch}
    .thead{position:sticky;top:0;z-index:5;background:#eef6ff;font-weight:700;border-bottom:1.5px solid #000}

    .cell{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:8px;display:flex;align-items:center;gap:6px;min-height:38px}
    .cell:last-child{border-right:none}

    /* Inputs tuned for smaller screens */
    input[type=number], input[type=date]{width:100%;border:none;outline:none;background:transparent;font-size:0.95rem;padding:3px 0}
    input[type=number]{text-align:right}

    /* Auto-growing textarea for Item */
    .item-input{width:100%;border:none;outline:none;background:transparent;font-size:0.95rem;line-height:1.25;resize:none;overflow:hidden;padding:2px 0;min-height:1.8em;max-height:9em}

    .row-actions{display:flex;gap:6px;align-items:center;flex-wrap:nowrap}
    .icon-btn{border:1px solid #000;border-radius:6px;background:#fff;padding:6px 8px;min-width:auto;min-height:auto;line-height:1;font-size:0.9rem}
    .icon-btn[disabled]{opacity:.5;cursor:not-allowed}

    /* Foot area compact */
    .foot{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:var(--card);padding:8px;border:1.5px solid #000;border-top:none;border-radius:0 0 6px 6px}
    .foot-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .sum{width:140px;border:1.5px solid #000;border-radius:4px;background:var(--sum);padding:8px 10px;text-align:right;font-weight:700;min-height:36px;display:flex;align-items:center;justify-content:flex-end;font-size:0.98rem}

    .box{width:160px;border:1.5px solid #000;border-radius:4px;background:#fff;padding:6px 8px;display:flex;flex-direction:column;gap:3px}
    .box label{font-size:0.78rem;color:#222}
    .box input{border:none;outline:none;font-size:0.95rem;width:100%}
    .box .value{font-weight:700;text-align:right;min-height:22px;font-size:0.95rem}

    @media (max-width: 420px){
      :root{ --cols: 2.1fr 0.9fr 0.9fr 0.8fr; }
      .table{ min-width: 720px; }
      .sum{ width:120px; }
      h1{ font-size:1rem; }
    }

    /* Sticky footer optional: keep controls visible */
    .foot{ position: sticky; bottom: 0; z-index: 4; }

    /* Simple modal */
    .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:9999;padding:16px}
    .modal.show{display:flex}
    .dialog{background:#fff;border:1.5px solid #000;border-radius:8px;max-width:92vw;width:480px;padding:14px}
    .dialog h2{margin:0 0 8px;font-size:1rem}
    .dialog p{margin:0 0 12px}
    .dialog .actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
    .list{max-height:50vh;overflow:auto;margin:8px 0;border:1px solid var(--line);border-radius:6px;background:#fafafa}
    .list-row{display:flex;align-items:center;gap:8px}
    .list-row button.name{flex:1;text-align:left;border:0;border-bottom:1px solid var(--line);border-radius:0;background:#fff;padding:12px 14px}
    .list-row button.trash{border:0;border-left:1px solid var(--line);border-bottom:1px solid var(--line);border-radius:0;background:#fff;padding:12px 14px}
    .list-row:last-child button.name,.list-row:last-child button.trash{border-bottom:0}
    .img-view{max-width:100%;height:auto;border:1px solid #000;border-radius:6px}
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="wrap">
        <img src="icons/icon-48.png" alt="Gastador" width="28" height="28" style="border-radius:8px;border:1px solid #000;background:#fff"/>
        <h1>Gastador</h1>
      </div>
    </header>

    <div class="toolbar">
      <button id="newBtn">New list</button>
      <button id="saveBtn">Save list</button>
      <button id="loadBtn">Load list</button>
    </div>

    <div class="table-wrap">
      <div class="table" role="table" aria-label="Financial records">
        <div class="thead" role="row">
          <div class="cell" role="columnheader">Item/s</div>
          <div class="cell" role="columnheader">Date</div>
          <div class="cell" role="columnheader">Amount</div>
          <div class="cell" role="columnheader">Actions</div>
        </div>
        <div id="tbody" role="rowgroup"></div>
      </div>
    </div>

    <div class="foot">
      <button id="addRow" aria-label="Add a row">+</button>
      <div class="foot-right">
        <div class="box">
          <label for="cashInput">Cash on hand</label>
          <input id="cashInput" type="number" inputmode="decimal" step="0.01" placeholder="0.00" aria-label="Cash on hand" />
        </div>
        <div class="box">
          <label>Change (Total - Cash)</label>
          <div class="value" id="changeBox">0.00</div>
        </div>
        <div class="sum" id="sumBox" aria-live="polite">0.00</div>
      </div>
    </div>
  </div>

  <!-- Confirm New modal -->
  <div id="confirmNew" class="modal" role="dialog" aria-modal="true" aria-labelledby="confirmNewTitle" style="display:none">
    <div class="dialog">
      <h2 id="confirmNewTitle">Start a new list?</h2>
      <p>This will clear all the data in the current displayed list. Do you want to proceed?</p>
      <div class="actions">
        <button id="cancelNew">Cancel</button>
        <button id="proceedNew">Proceed</button>
      </div>
    </div>
  </div>

  <!-- Load list chooser modal -->
  <div id="loadChooser" class="modal" role="dialog" aria-modal="true" aria-labelledby="loadChooserTitle" style="display:none">
    <div class="dialog">
      <h2 id="loadChooserTitle">Load a list</h2>
      <div id="listsContainer" class="list" aria-label="Saved lists"></div>
      <div class="actions">
        <button id="closeLoad">Close</button>
      </div>
    </div>
  </div>

  <!-- Image viewer modal -->
  <div id="imageViewer" class="modal" role="dialog" aria-modal="true" aria-labelledby="imageViewerTitle" style="display:none">
    <div class="dialog">
      <h2 id="imageViewerTitle">Item photo</h2>
      <div id="imageSlot"></div>
      <div class="actions">
        <button id="closeImage">Close</button>
      </div>
    </div>
  </div>

  <script>
    // ==== Utils ====
    const fmtDate = (d = new Date()) => {
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${d.getFullYear()}-${m}-${day}`;
    };
    const tbody = document.getElementById('tbody');
    const sumBox = document.getElementById('sumBox');
    const cashInput = document.getElementById('cashInput');
    const changeBox = document.getElementById('changeBox');

    // Storage keys
    const P='finrec:list:'; // named lists prefix
    const S='finrec:scratch'; // scratch autosave
    let currentListName = null; // track currently loaded list

    // Auto-grow helper for textarea
    function autosize(el){
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, parseInt(getComputedStyle(el).maxHeight)) + 'px';
    }

    // ==== Image helpers ====
    async function fileToDataUrlCompressed(file, maxDim = 1280, quality = 0.85){
      return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let { width, height } = img;
          if (width > height) {
            if (width > maxDim) { height = Math.round(height * (maxDim / width)); width = maxDim; }
          } else {
            if (height > maxDim) { width = Math.round(width * (maxDim / height)); height = maxDim; }
          }
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          const dataUrl = canvas.toDataURL('image/jpeg', quality);
          URL.revokeObjectURL(url);
          resolve(dataUrl);
        };
        img.onerror = reject;
        img.src = url;
      });
    }

    // ==== Row factory ====
    function makeRow(rec = { id: '', item: '', date: '', amount: '', photo: ''}){
      const row = document.createElement('div');
      row.className = 'row';
      // Ensure an id
      const rid = rec.id || ('r_' + Math.random().toString(36).slice(2));
      row.dataset.id = rid;

      // Item cell (textarea auto-grow)
      const cItem = document.createElement('div'); cItem.className = 'cell';
      const iItem = document.createElement('textarea'); iItem.className='item-input'; iItem.placeholder = 'Item name'; iItem.value = rec.item || '';
      iItem.setAttribute('aria-label','Item name');
      iItem.addEventListener('input', () => { autosize(iItem); autosave(); });
      // initialize size
      setTimeout(()=>autosize(iItem));
      cItem.appendChild(iItem);

      // Date cell (editable, calendar)
      const cDate = document.createElement('div'); cDate.className = 'cell';
      const iDate = document.createElement('input'); iDate.type = 'date'; iDate.value = rec.date || '';
      iDate.addEventListener('input', autosave);
      cDate.appendChild(iDate);

      // Amount cell
      const cAmt = document.createElement('div'); cAmt.className = 'cell';
      const iAmt = document.createElement('input'); iAmt.type = 'number'; iAmt.inputMode='decimal'; iAmt.placeholder='0.00'; iAmt.step='0.01';
      iAmt.value = rec.amount || '';
      iAmt.setAttribute('aria-label','Amount');
      iAmt.addEventListener('input', () => {
        if(!iDate.value && iAmt.value.trim() !== ''){ iDate.value = fmtDate(); }
        updateSum();
        autosave();
      });
      cAmt.appendChild(iAmt);

      // Actions cell: + (camera), view, delete
      const cAct = document.createElement('div'); cAct.className='cell';
      const actions = document.createElement('div'); actions.className='row-actions';

      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = 'image/*';
      fileInput.capture = 'environment';
      fileInput.style.display = 'none';

      const btnCam = document.createElement('button');
      btnCam.className = 'icon-btn'; btnCam.title = 'Take photo'; btnCam.setAttribute('aria-label','Take photo');
      btnCam.textContent = '+';
      btnCam.addEventListener('click', () => fileInput.click());

      const btnView = document.createElement('button');
      btnView.className = 'icon-btn'; btnView.title = 'View photo'; btnView.setAttribute('aria-label','View photo');
      btnView.innerHTML = '&#128065;';
      function syncViewState(){ btnView.disabled = !(row.dataset.photo && row.dataset.photo.length); }
      btnView.addEventListener('click', () => { if(!(row.dataset.photo && row.dataset.photo.length)) return; showImage(row.dataset.photo); });

      const btnDel = document.createElement('button');
      btnDel.className = 'icon-btn'; btnDel.title = 'Delete row'; btnDel.setAttribute('aria-label','Delete row');
      btnDel.innerHTML = '&#128465;';
      btnDel.addEventListener('click', () => { if(confirm('Delete this row?')){ row.remove(); updateSum(); autosave(); } });

      fileInput.addEventListener('change', async () => {
        const f = fileInput.files && fileInput.files[0]; if(!f) return;
        try{ const dataUrl = await fileToDataUrlCompressed(f); row.dataset.photo = dataUrl; syncViewState(); autosave(); }
        catch(e){ alert('Could not load photo'); }
        finally{ fileInput.value=''; }
      });

      actions.append(btnCam, btnView, btnDel, fileInput);
      cAct.appendChild(actions);

      row.append(cItem, cDate, cAmt, cAct);

      if(rec.photo){ row.dataset.photo = rec.photo; }
      syncViewState();

      return row;
    }

    function addRows(n=1){ for(let i=0;i<n;i++){ tbody.appendChild(makeRow()); } updateSum(); }

    function getData(){
      return Array.from(tbody.querySelectorAll('.row')).map(r => {
        const item = r.querySelector('.item-input').value.trim();
        const date = r.querySelector('input[type=date]').value.trim();
        const amountRaw = r.querySelector('input[type=number]').value.trim();
        const amount = amountRaw ? Number(parseFloat(amountRaw).toFixed(2)).toFixed(2) : '';
        const id = r.dataset.id;
        const photo = r.dataset.photo || '';
        return { id, item, date, amount, photo };
      }).filter(x => x.item || x.amount || x.date || x.photo);
    }

    function parseNum(v){ const n = parseFloat(v); return isNaN(n) ? 0 : n; }

    function updateSum(){
      let total = 0; tbody.querySelectorAll('input[type=number]').forEach(n => { const v = parseFloat(n.value); if(!isNaN(v)) total += v; });
      sumBox.textContent = total.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      const cash = parseNum(cashInput.value);
      const change = total - cash;
      changeBox.textContent = change.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function autosave(){
      const payload = { items: getData(), total: parseFloat(sumBox.textContent.replace(/,/g,'')) || 0, cash: parseNum(cashInput.value) };
      localStorage.setItem(S, JSON.stringify(payload));
      if(currentListName){
        const named = { name: currentListName, savedAt: new Date().toISOString(), ...payload };
        localStorage.setItem(P + currentListName, JSON.stringify(named));
      }
    }

    function restore(){
      const raw = localStorage.getItem(S);
      if(raw){
        try{
          const s = JSON.parse(raw);
          (s.items || []).forEach(rec => tbody.appendChild(makeRow(rec)));
          if(typeof s.cash === 'number' || (typeof s.cash === 'string' && s.cash.trim() !== '')){ cashInput.value = s.cash; }
        }catch(e){}
      }
      ensureFive(); updateSum();
    }

    function ensureFive(){ const c = tbody.querySelectorAll('.row').length; if(c < 5) addRows(5 - c); }

    // Modals
    function showModal(el){ el.classList.add('show'); el.style.display='flex'; }
    function hideModal(el){ el.classList.remove('show'); el.style.display='none'; }

    // New list flow
    function confirmNewList(){ showModal(document.getElementById('confirmNew')); }
    function proceedNewList(){ hideModal(document.getElementById('confirmNew')); tbody.innerHTML=''; ensureFive(); updateSum(); localStorage.removeItem(S); }

    // Save / Load
    function saveList(){
      const name = prompt('Save list as (name):');
      if(!name) return;
      if(localStorage.getItem(P + name)){ if(!confirm(`"${name}" already exists. Overwrite?`)) return; }
      const data = { name, savedAt: new Date().toISOString(), items: getData(), total: parseFloat(sumBox.textContent.replace(/,/g,'')) || 0, cash: parseNum(cashInput.value) };
      try{ localStorage.setItem(P + name, JSON.stringify(data)); currentListName = name; alert('Saved: ' + name);} catch(e){ alert('Save failed: ' + e); }
    }

    function showLoadChooser(){
      const box = document.getElementById('loadChooser');
      const container = document.getElementById('listsContainer');
      container.innerHTML = '';
      const keys = Object.keys(localStorage).filter(k => k.startsWith(P));
      if(!keys.length){ const empty = document.createElement('div'); empty.style.padding='12px'; empty.textContent='No saved lists yet.'; container.appendChild(empty); }
      else{
        keys.map(k => k.slice(P.length)).sort((a,b)=>a.localeCompare(b)).forEach(name => {
          const row = document.createElement('div'); row.className = 'list-row';
          const btn = document.createElement('button'); btn.className='name'; btn.textContent = name; btn.addEventListener('click', () => { loadListByName(name); hideModal(box); });
          const del = document.createElement('button'); del.className='trash'; del.title='Delete list'; del.setAttribute('aria-label', `Delete list ${name}`); del.innerHTML='&#128465;';
          del.addEventListener('click', (ev) => { ev.stopPropagation(); if(confirm(`Delete saved list "${name}"? This cannot be undone.`)){ localStorage.removeItem(P + name); showLoadChooser(); } });
          row.append(btn, del); container.appendChild(row);
        });
      }
      showModal(box);
    }

    function loadListByName(name){
      const raw = localStorage.getItem(P + name);
      if(!raw){ alert('List not found.'); return; }
      try{
        const d = JSON.parse(raw);
        tbody.innerHTML='';
        (d.items || []).forEach(rec => tbody.appendChild(makeRow(rec)));
        cashInput.value = (typeof d.cash !== 'undefined') ? d.cash : '';
        currentListName = name; ensureFive(); updateSum(); autosave();
      }catch(e){ alert('Could not load that list.'); }
    }

    // Image viewer
    function showImage(dataUrl){ const viewer = document.getElementById('imageViewer'); const slot = document.getElementById('imageSlot'); slot.innerHTML = ''; const img = document.createElement('img'); img.className='img-view'; img.src = dataUrl; slot.appendChild(img); showModal(viewer); }

    // Wire buttons
    document.getElementById('addRow').addEventListener('click', () => { tbody.appendChild(makeRow()); updateSum(); autosave(); });
    document.getElementById('saveBtn').addEventListener('click', saveList);
    document.getElementById('loadBtn').addEventListener('click', showLoadChooser);
    document.getElementById('newBtn').addEventListener('click', confirmNewList);

    // Modal buttons
    document.getElementById('cancelNew').addEventListener('click', () => hideModal(document.getElementById('confirmNew')));
    document.getElementById('proceedNew').addEventListener('click', proceedNewList);
    document.getElementById('closeLoad').addEventListener('click', () => hideModal(document.getElementById('loadChooser')));
    document.getElementById('closeImage').addEventListener('click', () => hideModal(document.getElementById('imageViewer')));

    // Register service worker
    if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(()=>{}); }); }

    // Cash input change
    cashInput.addEventListener('input', () => { updateSum(); autosave(); });

    // Init
    restore();
  </script>
</body>
</html>
